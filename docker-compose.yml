version: '3.8'

services:
  db:
    image: pgvector/pgvector:16-pg16
    container_name: itacs-db
    environment:
      POSTGRES_DB: itacs_enterprise
      POSTGRES_USER: itacs_admin
      POSTGRES_PASSWORD: itacs_secure_pass_2026
    ports:
      - "5435:5432" # Mapped host port to 5435 to prevent local postgres conflicts
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itacs_admin -d itacs_enterprise"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itacs-backend
    ports:
      - "8080:8000" # Mapped host port to 8080 to prevent uvicorn conflicts
    environment:
      - DATABASE_URL=postgresql://itacs_admin:itacs_secure_pass_2026@db:5432/itacs_enterprise
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itacs-frontend
    ports:
      - "3000:5173" # Mapped host port to 3000 to prevent Vite/Gemini-Enterprise conflicts
    environment:
      - VITE_API_URL=http://localhost:8080 # Points frontend API calls to local port 8080
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
